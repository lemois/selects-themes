<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello World</title>
    <link rel="stylesheet" href="./assets/style.css" />
    <script src="./runtime-env.js" defer></script>
    <script src="https://selects.gift/sdk/v1.js" defer></script>
    <script src="./assets/alpine-start.js" defer></script>
  </head>
  <body>
    <main x-data="params" x-cloak>
      <h1>Hello world</h1>
      <section x-show="keyVisual">
        <h2>key visual</h2>
        <img :src="keyVisual" alt="キービジュアル" width="480" loading="lazy" />
      </section>
      <section x-show="accentColor">
        <h2>accent color</h2>
        <div
          :style="`background:${accentColor};width:96px;height:96px;border:1px solid #ccc;`"
          aria-label="アクセントカラーのプレビュー"
        ></div>
        <p x-text="accentColor"></p>
      </section>
      <section x-show="message">
        <h2>message</h2>
        <p x-text="message"></p>
      </section>

      <section x-data="items" class="items-section">
        <h2>商品一覧</h2>

        <template x-if="loading">
          <p>商品を読み込んでいます...</p>
        </template>

        <template x-if="error">
          <div class="status-box">
            <p x-text="error.message"></p>
            <button type="button" x-show="error.isRetryable" @click="fetch()">再読み込み</button>
          </div>
        </template>

        <template x-if="data">
          <div>
            <template x-for="(sectionItems, sectionName) in sections" :key="sectionName">
              <article>
                <h3 x-text="sectionName"></h3>
                <ul>
                  <template x-for="item in sectionItems" :key="item.id">
                    <li>
                      <p>
                        <strong x-text="item.name"></strong>
                      </p>
                      <img
                        :src="createImageUrl(item.catalogItemImages[0]?.image, 'thumbnail')"
                        alt="商品画像"
                        width="240"
                        loading="lazy"
                      />
                      <a class="button-link" :href="`./catalog-items/${item.id}`">商品詳細を見る</a>
                    </li>
                  </template>
                </ul>
              </article>
            </template>
          </div>
        </template>
      </section>
    </main>
  </body>
</html>
