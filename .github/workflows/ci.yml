name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check

  deploy:
    name: Deploy to R2
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    concurrency:
      group: deploy-r2-main
      cancel-in-progress: true
    env:
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ secrets.R2_BUCKET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deploy settings
        run: |
          test -n "${R2_ACCOUNT_ID}" || (echo "R2_ACCOUNT_ID is not set" && exit 1)
          test -n "${R2_BUCKET}" || (echo "R2_BUCKET is not set" && exit 1)
          test -n "${AWS_ACCESS_KEY_ID}" || (echo "R2_ACCESS_KEY_ID is not set" && exit 1)
          test -n "${AWS_SECRET_ACCESS_KEY}" || (echo "R2_SECRET_ACCESS_KEY is not set" && exit 1)

      - name: Show AWS CLI version
        run: aws --version

      - name: Sync files to Cloudflare R2
        run: ./scripts/deploy-r2.sh
